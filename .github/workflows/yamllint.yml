---
name: YAML Lint

"on":
  push:
  pull_request:

jobs:
  yamllint:
    runs-on: ubuntu-latest
    name: YAML Lint Check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint --format parsable --strict .
