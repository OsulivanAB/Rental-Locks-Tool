---
# GitHub Repository Settings
# This file can be used with the GitHub Settings app
# or as documentation for manual branch protection setup

repository:
  # General repository settings
  name: Rental-Locks-Tool
  description: "Tool to help me manage my rental locks"
  homepage: ""
  topics: "home-assistant,rental-management,locks,automation"
  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  delete_branch_on_merge: true

# Branch protection rules
branches:
  - name: main
    protection:
      # Require status checks to pass before merging
      required_status_checks:
        strict: true
        contexts:
          # Job name from check-config.yml
          - "Check Home Assistant Configuration"
          # Job name from yamllint.yml
          - "YAML Lint Check"

      # Require pull request reviews before merging
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        restrict_dismissals: false

      # Additional protection settings
      enforce_admins: false
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false

      # Require branches to be up to date before merging
      required_linear_history: false
